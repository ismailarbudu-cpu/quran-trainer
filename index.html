<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр для заучивания Курана</title>
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --bg: #f5f5f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #fff;
            border-bottom: 2px solid #eee;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }

        select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px;
            background: #fafafa;
            cursor: pointer;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
            scroll-behavior: smooth;
        }

        .ayah-card {
            padding: 25px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
            position: relative;
        }

        .ayah-card:hover {
            border-color: var(--secondary);
            background: #f1f8e9;
        }

        .ayah-card.playing {
            border-color: var(--secondary);
            background: #e8f5e9;
            box-shadow: inset 5px 0 0 var(--secondary);
        }

        .arabic-text {
            font-size: 30px;
            line-height: 2.2;
            color: #212121;
            direction: rtl;
            word-wrap: break-word;
        }

        .ayah-meta {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            direction: ltr;
            font-size: 13px;
            color: #9e9e9e;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--primary);
            font-weight: bold;
        }

        /* Полоса прокрутки */
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
	<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
</head> 
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0">Hifz Trainer</h2>
    </div>

    <div class="controls-grid">
        <div class="control-item">
            <label>Чтец</label>
            <select id="reciterSelect">
                <optgroup label="Классика (рекомендуется для заучивания)">
                    <option value="ar.husary">Махмуд аль-Хусари</option>
                    <option value="ar.minshawi">Мухаммад аль-Миншави</option>
                    <option value="ar.abdulsamad">Абдул Басит (Муртиль)</option>
                    <option value="ar.alafasy" selected>Мишари Рашид аль-Афаси</option>
                </optgroup>
                <optgroup label="Медина и Мекка">
                    <option value="ar.ayyoub">Мухаммад Айюб</option>
                    <option value="ar.hudhaify">Али аль-Хузейфи</option>
                    <option value="ar.mahermuaiqly">Махер аль-Муайкли</option>
                    <option value="ar.sudais">Абдуррахман ас-Судейс</option>
                </optgroup>
                <optgroup label="Другие">
                    <option value="ar.hanirifai">Хани ар-Рифаи</option>
                    <option value="ar.ghamadi">Саад аль-Гамди</option>
                    <option value="ar.shatree">Абу Бакр аш-Шатри</option>
                </optgroup>
            </select>
        </div>

        <div class="control-item">
            <label>Сура</label>
            <select id="surahSelect">
                <option value="">Загрузка списка...</option>
            </select>
        </div>

        <div class="control-item">
            <label>Аят</label>
            <select id="ayahJumpSelect">
                <option value="0">Все аяты</option>
            </select>
        </div>
    </div>

    <div id="loader" class="loader" style="display:none">Загрузка аудио и текста...</div>
    
    <div class="content-area" id="ayahContainer">
        <div style="text-align:center; color:#888; margin-top:50px;">
            Выберите суру для начала работы
        </div>
    </div>
</div>

<script>
    const surahSelect = document.getElementById('surahSelect');
    const ayahJumpSelect = document.getElementById('ayahJumpSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const ayahContainer = document.getElementById('ayahContainer');
    const loader = document.getElementById('loader');

    let currentAudio = null;

    // Инициализация - загружаем список сур
    async function fetchSurahList() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            surahSelect.innerHTML = '<option value="">Выберите суру</option>';
            data.data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.number;
                opt.textContent = `${s.number}. ${s.englishName} (${s.name})`;
                surahSelect.appendChild(opt);
            });
        } catch (e) {
            ayahContainer.innerHTML = 'Ошибка сети при загрузке списка сур.';
        }
    }

    // Загрузка содержимого суры
    async function loadSurah() {
        const surahNum = surahSelect.value;
        const reciter = reciterSelect.value;
        if (!surahNum) return;

        ayahContainer.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${surahNum}/${reciter}`);
            const data = await res.json();
            
            if (data.code === 200) {
                renderAyahs(data.data.ayahs);
                updateAyahDropdown(data.data.ayahs);
            }
        } catch (e) {
            ayahContainer.innerHTML = 'Не удалось загрузить аяты.';
        } finally {
            loader.style.display = 'none';
        }
    }

    // Отрисовка списка аятов
    function renderAyahs(ayahs) {
        ayahContainer.innerHTML = '';
        ayahs.forEach((ayah) => {
            const card = document.createElement('div');
            card.className = 'ayah-card';
            card.id = `ayah-target-${ayah.numberInSurah}`;
            card.innerHTML = `
                <div class="arabic-text">${ayah.text}</div>
                <div class="ayah-meta">
                    <span>Аят ${ayah.numberInSurah}</span>
                    <span><svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/></svg> Нажмите для прослушивания</span>
                </div>
            `;
            
            card.onclick = () => playAudio(ayah.audio, card);
            ayahContainer.appendChild(card);
        });
    }

    // Обновление списка аятов для быстрого перехода
    function updateAyahDropdown(ayahs) {
        ayahJumpSelect.innerHTML = '<option value="0">Все аяты</option>';
        ayahs.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.numberInSurah;
            opt.textContent = `Аят ${a.numberInSurah}`;
            ayahJumpSelect.appendChild(opt);
        });
    }

    // Воспроизведение
    function playAudio(url, cardElement) {
        if (currentAudio) {
            currentAudio.pause();
            document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('playing'));
        }

        currentAudio = new Audio(url);
        cardElement.classList.add('playing');
        currentAudio.play();

        currentAudio.onended = () => {
            cardElement.classList.remove('playing');
        };
    }

    // Слушатели
    surahSelect.addEventListener('change', loadSurah);
    reciterSelect.addEventListener('change', loadSurah);
    
    ayahJumpSelect.addEventListener('change', (e) => {
        const num = e.target.value;
        if (num === "0") return;
        const target = document.getElementById(`ayah-target-${num}`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.click(); // Сразу запускаем звук
        }
    });

    fetchSurahList();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker зарегистрирован!', reg))
        .catch(err => console.log('Ошибка регистрации SW', err));
    });
  }
</script>

</body>
</html>
